services:
  - type: web
    name: red-raider-loyalty
    runtime: node
    buildCommand: npm install && node database/seed.js
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
